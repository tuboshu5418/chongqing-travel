<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>重庆-丰都家庭游 · 6天5晚</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- 顶部阅读进度条 -->
    <div id="reading-progress-bar"></div>
    
    <!-- 返回顶部按钮 -->
    <button id="back-to-top" aria-label="返回顶部">↑</button>

    <!-- 悬浮卡片 -->
    <div id="floating-card" style="display:none;">
        <div id="floating-card-content">
            <button id="floating-card-close">×</button>
            <img id="floating-card-img" src="" alt="" />
            <h3 id="floating-card-name"></h3>
            <p id="floating-card-desc"></p>
            <button id="floating-card-jump">跳转至行程</button>
        </div>
    </div>

    <div class="app-container" id="app">
        <!-- 头部 -->
        <header class="header">
            <h1>🏠 重庆-丰都家庭游</h1>
            <div class="sub">6天5晚 · 从山城到鬼城 · 老少皆宜</div>
            <div class="family-tag">👨‍👩‍👧‍👦 含老人 · 儿童 · 中年人 · 青年</div>
        </header>

        <!-- 路线总览 -->
        <div class="overview-group open" id="overview-group">
            <div class="overview-header" onclick="window.toggleOverview(this)">
                <span class="title">🗺️ 路线总览 <small>点击下方标签切换天数</small></span>
                <span class="arrow">▾</span>
            </div>
            <div class="overview-body">
                <div class="tab-bar" id="tab-bar"></div>
                <div id="overview-maps"></div>
                <div class="route-legend">
                    <span><span class="dot" style="background:#4a6a7f;"></span> Day 1</span>
                    <span><span class="dot" style="background:#6a7f8a;"></span> Day 2</span>
                    <span><span class="dot" style="background:#8a7a6a;"></span> Day 3</span>
                    <span><span class="dot" style="background:#9a8a7a;"></span> Day 4</span>
                    <span><span class="dot" style="background:#b0a090;"></span> Day 5</span>
                    <span><span class="dot" style="background:#a0524a;"></span> Day 6</span>
                </div>
                <div class="route-hint"><span>👆 点击路线图上的圆点查看景点卡片</span></div>
            </div>
        </div>
        <!-- 一键展开/收起 -->
        <div id="expand-collapse-bar">
            <button class="btn-ctrl" id="expand-all-btn">📂 全部展开</button>
            <button class="btn-ctrl" id="collapse-all-btn">📁 全部收起</button>
        </div>
        <!-- 每日行程 -->
        <div id="day-groups-container"></div>
        <!-- ============================================================
        修改模式 - 密码验证
        ============================================================ -->
        <div id="admin-panel" style="margin-top:20px; padding:16px; background:#f5f2ef; border-radius:16px; border:1px solid #e0dbd3;">
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <button id="admin-toggle-btn" style="padding:8px 20px; border-radius:30px; border:1px solid #c0b0a8; background:#f0ede8; cursor:pointer; font-size:14px;">
                    🔧 修改模式
                </button>
                <div id="admin-login-area" style="display:none; align-items:center; gap:10px; flex-wrap:wrap;">
                    <input type="password" id="admin-password-input" placeholder="请输入密码" style="padding:8px 14px; border-radius:30px; border:1px solid #ddd9d2; font-size:14px; width:160px;">
                    <button id="admin-login-btn" style="padding:8px 20px; border-radius:30px; border:none; background:#4a6a7f; color:#fff; cursor:pointer; font-size:14px;">验证</button>
                    <span id="admin-login-status" style="font-size:13px; color:#a0524a;"></span>
                </div>
                <div id="admin-edit-area" style="display:none; flex-wrap:wrap; gap:8px;">
                    <span style="font-size:13px; color:#4a6a7f;">✅ 已进入修改模式</span>
                </div>
            </div>
        </div>
        <div class="footer">
            📅 行程仅供参考 · 以实际开放时间为准 · 祝旅途愉快
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
