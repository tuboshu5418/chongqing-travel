<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes" />
    <title>重庆-丰都家庭游 · 6天5晚</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- 顶部阅读进度条 -->
    <div id="reading-progress-bar"></div>

    <!-- 返回顶部按钮 -->
    <button id="back-to-top" aria-label="返回顶部">↑</button>

    <!-- 悬浮卡片 -->
    <div id="floating-card" style="display:none;">
        <div id="floating-card-content">
            <button id="floating-card-close">×</button>
            <img id="floating-card-img" src="" alt="" />
            <h3 id="floating-card-name"></h3>
            <p id="floating-card-desc"></p>
            <button id="floating-card-jump">跳转至行程</button>
        </div>
    </div>

    <div class="app-container" id="app">
        <!-- 头部 -->
        <header class="header">
            <h1>🏠 重庆-丰都家庭游</h1>
            <div class="sub">6天5晚 · 从山城到鬼城 · 老少皆宜</div>
            <div class="family-tag">👨‍👩‍👧‍👦 含老人 · 儿童 · 中年人 · 青年</div>
        </header>

        <!-- 路线总览 -->
        <div class="overview-group open" id="overview-group">
            <div class="overview-header" onclick="window.toggleOverview(this)">
                <span class="title">🗺️ 路线总览 <small>点击下方标签切换天数</small></span>
                <span class="arrow">▾</span>
            </div>
            <div class="overview-body">
                <div class="tab-bar" id="tab-bar"></div>
                <div id="overview-maps"></div>
                <div class="route-legend">
                    <span><span class="dot" style="background:#4a6a7f;"></span> Day 1</span>
                    <span><span class="dot" style="background:#6a7f8a;"></span> Day 2</span>
                    <span><span class="dot" style="background:#8a7a6a;"></span> Day 3</span>
                    <span><span class="dot" style="background:#9a8a7a;"></span> Day 4</span>
                    <span><span class="dot" style="background:#b0a090;"></span> Day 5</span>
                    <span><span class="dot" style="background:#a0524a;"></span> Day 6</span>
                </div>
                <div class="route-hint"><span>👆 点击路线图上的圆点查看景点卡片</span></div>
            </div>
        </div>

        <!-- 每日行程 -->
        <div id="day-groups-container"></div>

        <div class="footer">
            📅 行程仅供参考 · 以实际开放时间为准 · 祝旅途愉快
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
