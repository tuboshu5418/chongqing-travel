                    btn.textContent = 'Day ' + day.day;
                    btn.onclick = () => switchTab(day.day);
                    tabBar.appendChild(btn);
                });

                renderMap(currentTab);
                renderLegend();
            }

            function renderLegend() {
                const legend = document.getElementById('route-legend');
                legend.innerHTML = '';
                if (!allDaysData || allDaysData.length === 0) return;
                const colors = ['#4a6a7f', '#6a7f8a', '#8a7a6a', '#9a8a7a', '#b0a090', '#a0524a'];
                allDaysData.forEach((day, idx) => {
                    const span = document.createElement('span');
                    span.innerHTML =
                        `<span class="dot" style="background:${colors[idx % colors.length]};"></span> Day ${day.day}`;
                    legend.appendChild(span);
                });
            }

            function renderMap(day) {
                const container = document.getElementById('overview-maps');
                const dayData = allDaysData.find(d => d.day === day);
                const imgUrl = MAP_IMAGE_BASE + '/day' + day + '_overview.png';

                let html = `<div class="map-wrapper" id="map-wrapper-${day}">`;
                html += `<img src="${imgUrl}" alt="Day ${day} 路线图" 
                            onerror="this.style.display='none'; document.getElementById('map-error-${day}').style.display='flex';" />`;
                html += `<div id="map-error-${day}" style="display:none; height:300px; align-items:center; justify-content:center; color:#8a8a8a; background:#f6f4f1; border-radius:14px; flex-direction:column; gap:8px;">
                            <span>🖼️ 图片加载失败</span>
                            <span style="font-size:13px;">请确认 maps/day${day}_overview.png 已上传</span>
                        </div>`;

                if (dayData && dayData.places) {
                    dayData.places.forEach((place, idx) => {
                        const x = place.map_x || (10 + (idx / Math.max(dayData.places.length - 1, 1)) * 80);
                        const y = place.map_y || (20 + (idx % 2) * 40 + 10);
                        const draggable = isAdminMode ? 'draggable' : '';
                        html += `<div class="map-point ${draggable}" 
                                    style="left:${x}%; top:${y}%;" 
                                    data-day="${day}" data-place-id="${place.id}"
                                    onmouseenter="onMapPointEnter(${day}, '${place.id}', this)" 
                                    onmouseleave="onMapPointLeave()"
                                    onclick="onMapPointClick(${day}, '${place.id}', this)">
                                    ${idx + 1}
                                    ${isAdminMode ? '<span class="drag-handle">⤡</span>' : ''}
                                </div>`;
                    });
                }

                html += '</div>';
                container.innerHTML = html;

                if (isAdminMode) {
                    setupDragEvents(day);
                }
            }

            function switchTab(day) {
                currentTab = day;
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.toggle('active', parseInt(btn.dataset.day) === day);
                });
                renderMap(day);
            }

            // ============================================================
            // 5. 地图拖动
            // ============================================================
            function setupDragEvents(day) {
                const points = document.querySelectorAll(`#map-wrapper-${day} .map-point.draggable`);
                points.forEach(point => {
                    point.addEventListener('mousedown', function(e) {
                        if (!isAdminMode) return;
                        e.preventDefault();
                        startDrag(e, this);
                    });
                    point.addEventListener('touchstart', function(e) {
                        if (!isAdminMode) return;
                        e.preventDefault();
                        startDrag(e, this);
                    }, { passive: false });
                });
            }

            function startDrag(e, element) {
                const wrapper = element.closest('.map-wrapper');
                const wrapperRect = wrapper.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                dragState = {
                    element: element,
                    wrapperRect: wrapperRect,
                    placeId: element.dataset.placeId,
                    day: parseInt(element.dataset.day)
                };

                element.classList.add('dragging');

                document.addEventListener('mousemove', onDrag);
                document.addEventListener('mouseup', endDrag);
                document.addEventListener('touchmove', onDrag, { passive: false });
                document.addEventListener('touchend', endDrag);
            }

            function onDrag(e) {
                if (!dragState) return;
                e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const rect = dragState.wrapperRect;
                const x = ((clientX - rect.left) / rect.width) * 100;
                const y = ((clientY - rect.top) / rect.height) * 100;
                dragState.element.style.left = Math.max(0, Math.min(100, x)) + '%';
                dragState.element.style.top = Math.max(0, Math.min(100, y)) + '%';
            }

            function endDrag() {
                if (!dragState) return;
                const element = dragState.element;
                const placeId = dragState.placeId;
                const day = dragState.day;
                element.classList.remove('dragging');

                const left = parseFloat(element.style.left);
                const top = parseFloat(element.style.top);
                const mapX = Math.round(left);
                const mapY = Math.round(top);

                const dayData = allDaysData.find(d => d.day === day);
                if (dayData) {
                    const place = dayData.places.find(p => p.id == placeId);
                    if (place) {
                        place.map_x = mapX;
                        place.map_y = mapY;
                    }
                }
                editedData['place_' + placeId] = {
                    ...editedData['place_' + placeId],
                    map_x: mapX,
                    map_y: mapY
                };

                document.removeEventListener('mousemove', onDrag);
                document.removeEventListener('mouseup', endDrag);
                document.removeEventListener('touchmove', onDrag);
                document.removeEventListener('touchend', endDrag);
                dragState = null;
            }

            // ============================================================
            // 6. 悬浮卡片
            // ============================================================
            function getPlaceById(day, placeId) {
                const dayData = allDaysData.find(d => d.day === day);
                if (!dayData || !dayData.places) return null;
                return dayData.places.find(p => p.id == placeId);
            }

            function showFloatingCard(day, placeId, event, isPinned = false) {
                const place = getPlaceById(day, placeId);
                if (!place) return;
                if (hideTimeout) { clearTimeout(hideTimeout);
                    hideTimeout = null; }

                floatingCardData = { day, placeId };
                floatingCardName.textContent = place.name;
                floatingCardDesc.textContent = place.intro || '暂无介绍';

                const imgName = getImageName(place.name);
                if (imgName) {
                    floatingCardImg.src = GITHUB_IMAGE_BASE + '/' + imgName;
                    floatingCardImg.style.display = 'block';
                    floatingCardImg.onerror = () => { floatingCardImg.style.display = 'none'; };
                } else {
                    floatingCardImg.style.display = 'none';
                }

                const rect = event.getBoundingClientRect();
                let left = rect.left + rect.width / 2 - 140;
                let top = rect.bottom + 12;
                if (left < 10) left = 10;
                if (left + 280 > window.innerWidth - 10) left = window.innerWidth - 290;
                if (top + 300 > window.innerHeight - 10) { top = rect.top - 300 - 12; }

                floatingCard.style.left = left + 'px';
                floatingCard.style.top = top + 'px';
                floatingCard.style.display = 'block';
                floatingCardPinned = isPinned;
                floatingCard.dataset.pinned = isPinned ? 'true' : 'false';

                requestAnimationFrame(() => { floatingCard.classList.add('show'); });
            }

            function hideFloatingCard(immediate = false) {
                if (floatingCardPinned) return;
                if (hideTimeout) { clearTimeout(hideTimeout);
                    hideTimeout = null; }
                const delay = immediate ? 0 : 300;
                hideTimeout = setTimeout(() => {
                    if (!floatingCardPinned && !isHovering) {
                        floatingCard.classList.remove('show');
                        setTimeout(() => { if (!floatingCardPinned) floatingCard.style.display = 'none'; }, 300);
                    }
                    hideTimeout = null;
                }, delay);
            }

            function onMapPointEnter(day, placeId, element) {
                isHovering = true;
                if (hideTimeout) { clearTimeout(hideTimeout);
                    hideTimeout = null; }
                if (!floatingCardPinned) { showFloatingCard(day, placeId, element, false); }
            }

            function onMapPointLeave() {
                isHovering = false;
                if (!floatingCardPinned) { hideFloatingCard(false); }
            }

            function onMapPointClick(day, placeId, element) {
                if (floatingCardPinned && floatingCardData &&
                    floatingCardData.day === day && floatingCardData.placeId == placeId) {
                    floatingCardPinned = false;
                    floatingCard.dataset.pinned = 'false';
                    isHovering = false;
                    hideFloatingCard(true);
                    element.classList.remove('active');
                    return;
                }
                if (hideTimeout) { clearTimeout(hideTimeout);
                    hideTimeout = null; }
                document.querySelectorAll('.map-point.active').forEach(el => el.classList.remove('active'));
                element.classList.add('active');
                showFloatingCard(day, placeId, element, true);
            }

            floatingCardClose.onclick = function(e) {
                e.stopPropagation();
                floatingCardPinned = false;
                floatingCard.dataset.pinned = 'false';
                document.querySelectorAll('.map-point.active').forEach(el => el.classList.remove('active'));
                isHovering = false;
                hideFloatingCard(true);
            };

            document.addEventListener('click', function(e) {
                if (floatingCard.style.display === 'block' &&
                    !floatingCard.contains(e.target) &&
                    !e.target.closest('.map-point')) {
                    if (!floatingCardPinned) { isHovering = false;
                        hideFloatingCard(true); }
                }
            });

            floatingCardJump.onclick = function() {
                if (!floatingCardData) return;
                const { day, placeId } = floatingCardData;
                floatingCardPinned = false;
                floatingCard.dataset.pinned = 'false';
                document.querySelectorAll('.map-point.active').forEach(el => el.classList.remove('active'));
                hideFloatingCard(true);

                const targetDay = document.getElementById('day-group-' + day);
                if (targetDay) {
                    targetDay.classList.add('open');
                    const body = targetDay.querySelector('.day-body');
                    if (body) {
                        body.style.maxHeight = '0';
                        body.style.opacity = '0';
                        body.style.padding = '0 20px';
                        requestAnimationFrame(() => {
                            body.style.maxHeight = '5000px';
                            body.style.opacity = '1';
                            body.style.padding = '6px 20px 24px';
                        });
                    }
                    setTimeout(() => {
                        const card = targetDay.querySelector(`.place-card[data-place-id="${placeId}"]`);
                        if (card) {
                            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            card.style.transition = 'box-shadow 0.3s ease, border-color 0.3s ease';
                            card.style.boxShadow = '0 0 0 3px #a0524a, 0 4px 20px rgba(160,82,74,0.2)';
                            card.style.borderColor = '#a0524a';
                            setTimeout(() => {
                                card.style.boxShadow = '';
                                card.style.borderColor = '';
                            }, 3000);
                        }
                    }, 400);
                }
            };

            // ============================================================
            // 7. 折叠切换 + Sticky
            // ============================================================

            window.toggleDay = function(header) {
                const group = header.closest('.day-group');
                if (!group) return;
                const body = group.querySelector('.day-body');
                if (!body) return;

                const isOpen = group.classList.contains('open');
                if (isOpen) {
                    body.style.maxHeight = body.scrollHeight + 'px';
                    requestAnimationFrame(() => {
                        body.style.maxHeight = '0';
                        body.style.opacity = '0';
                        body.style.padding = '0 20px';
                    });
                    group.classList.remove('open');
                    header.classList.remove('sticky');
                } else {
                    group.classList.add('open');
                    body.style.maxHeight = '0';
                    body.style.opacity = '0';
                    body.style.padding = '0 20px';
                    requestAnimationFrame(() => {
                        body.style.maxHeight = '5000px';
                        body.style.opacity = '1';
                        body.style.padding = '6px 20px 24px';
                    });
                    setTimeout(() => checkSticky(), 150);
                }
            };

            function checkSticky() {
                document.querySelectorAll('.day-group .day-header').forEach(header => {
                    const rect = header.getBoundingClientRect();
                    if (rect.top <= 0) {
                        header.classList.add('sticky');
                    } else {
                        header.classList.remove('sticky');
                    }
                });
            }

            function setupStickyDays() {
                window.addEventListener('scroll', function() {
                    requestAnimationFrame(checkSticky);
                }, { passive: true });
                window.addEventListener('resize', function() {
                    requestAnimationFrame(checkSticky);
                }, { passive: true });
                setTimeout(checkSticky, 100);
                setTimeout(checkSticky, 500);
            }

            function setupExpandCollapse() {
                const expandBtn = document.getElementById('expand-all-btn');
                const collapseBtn = document.getElementById('collapse-all-btn');

                if (expandBtn) {
                    expandBtn.onclick = function() {
                        document.querySelectorAll('.day-group').forEach(group => {
                            const body = group.querySelector('.day-body');
                            if (body && !group.classList.contains('open')) {
                                group.classList.add('open');
                                body.style.maxHeight = '0';
                                body.style.opacity = '0';
                                body.style.padding = '0 20px';
                                requestAnimationFrame(() => {
                                    body.style.maxHeight = '5000px';
                                    body.style.opacity = '1';
                                    body.style.padding = '6px 20px 24px';
                                });
                            }
                        });
                        setTimeout(checkSticky, 300);
                    };
                }

                if (collapseBtn) {
                    collapseBtn.onclick = function() {
                        document.querySelectorAll('.day-group').forEach(group => {
                            const body = group.querySelector('.day-body');
                            const header = group.querySelector('.day-header');
                            if (body && group.classList.contains('open')) {
                                body.style.maxHeight = body.scrollHeight + 'px';
                                requestAnimationFrame(() => {
                                    body.style.maxHeight = '0';
                                    body.style.opacity = '0';
                                    body.style.padding = '0 20px';
                                });
                                group.classList.remove('open');
                                if (header) header.classList.remove('sticky');
                            }
                        });
                    };
                }
            }

            // ============================================================
            // 8. 修改模式
            // ============================================================

            function setupAdminMode() {
                const toggleBtn = document.getElementById('admin-toggle-btn');
                const loginArea = document.getElementById('admin-login-area');
                const editArea = document.getElementById('admin-edit-area');
                const saveHint = document.getElementById('admin-save-hint');
                const passwordInput = document.getElementById('admin-password-input');
                const loginBtn = document.getElementById('admin-login-btn');
                const statusSpan = document.getElementById('admin-login-status');
                const saveBtn = document.getElementById('admin-save-btn');

                if (!toggleBtn) return;

                toggleBtn.onclick = function() {
                    if (isAdminMode) {
                        isAdminMode = false;
                        loginArea.style.display = 'flex';
                        editArea.style.display = 'none';
                        saveHint.classList.remove('show');
                        statusSpan.textContent = '';
                        toggleBtn.textContent = '🔧 修改模式';
                        toggleBtn.style.borderColor = '#c0b0a8';
                        editedData = {};
                        renderDays();
                        renderOverview();
                    } else {
                        loginArea.style.display = 'flex';
                        toggleBtn.textContent = '🔧 退出修改';
                        toggleBtn.style.borderColor = '#a0524a';
                        passwordInput.value = '';
                        passwordInput.focus();
                        statusSpan.textContent = '';
                        saveHint.classList.add('show');
                        editedData = {};
                        renderDays();
                        renderOverview();
                    }
                };

                loginBtn.onclick = async function() {
                    const password = passwordInput.value.trim();
                    if (!password) {
                        statusSpan.textContent = '请输入密码';
                        return;
                    }

                    try {
                        const response = await fetch('/api/admin/verify', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ password })
                        });
                        const result = await response.json();

                        if (result.success) {
                            isAdminMode = true;
                            statusSpan.textContent = '✅ 验证成功！';
                            editArea.style.display = 'flex';
                            loginArea.style.display = 'none';
                            toggleBtn.textContent = '🔧 退出修改';
                            saveHint.classList.add('show');
                            renderDays();
                            renderOverview();
                        } else {
                            statusSpan.textContent = '❌ ' + (result.error || '密码错误');
                        }
                    } catch (e) {
                        statusSpan.textContent = '❌ 网络错误';
                    }
                };

                passwordInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { loginBtn.click(); }
                });

                document.getElementById('admin-add-day-btn').onclick = function() {
                    if (!isAdminMode) { alert('请先进入修改模式'); return; }
                    addNewDay();
                };

                saveBtn.onclick = function() {
                    if (!isAdminMode) { alert('请先进入修改模式'); return; }
                    saveAllChanges();
                };
            }

            // ============================================================
            // 9. API 操作
            // ============================================================

            async function apiCall(method, url, data) {
                const options = {
                    method: method,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (data) options.body = JSON.stringify(data);
                const response = await fetch(url, options);
                return await response.json();
            }

            function getPassword() {
                return document.getElementById('admin-password-input').value.trim();
            }

            async function sha256(message) {
                const buf = new TextEncoder().encode(message);
                const hash = await crypto.subtle.digest('SHA-256', buf);
                return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
            }

            async function saveAllChanges() {
                const password = getPassword();
                if (!password) { alert('请输入管理员密码'); return; }

                let successCount = 0;
                let failCount = 0;

                for (const [key, value] of Object.entries(editedData)) {
                    try {
                        if (key.startsWith('day_')) {
                            const dayNum = parseInt(key.replace('day_', ''));
                            const result = await apiCall('PUT', '/api/itinerary/' + dayNum, {
                                password: password,
                                ...value
                            });
                            if (result.success) successCount++;
                            else failCount++;
                        } else if (key.startsWith('place_')) {
                            const placeId = parseInt(key.replace('place_', ''));
                            const result = await apiCall('PUT', '/api/places/' + placeId, {
                                password: password,
                                ...value
                            });
                            if (result.success) successCount++;
                            else failCount++;
                        }
                    } catch (e) {
                        failCount++;
                    }
                }

                if (failCount === 0 && successCount > 0) {
                    alert('✅ 所有修改已保存成功！');
                    editedData = {};
                    await reloadData();
                } else if (successCount > 0 && failCount > 0) {
                    alert('⚠️ 部分修改保存失败。成功 ' + successCount + ' 项，失败 ' + failCount + ' 项。');
                    await reloadData();
                } else {
                    alert('⚠️ 没有检测到需要保存的修改，或全部保存失败。');
                }
            }

            async function addNewDay() {
                const password = getPassword();
                if (!password) { alert('请输入管理员密码'); return; }

                const dayNum = allDaysData.length > 0 ? Math.max(...allDaysData.map(d => d.day)) + 1 : 1;
                const result = await apiCall('POST', '/api/itinerary', {
                    password: password,
                    title: 'Day ' + dayNum,
                    subtitle: '新行程',
                    walk_badge: '',
                    rest_note: '',
                    breakfast: '',
                    lunch: '',
                    dinner: '',
                    place_order: [],
                    day_alternatives: {},
                    notes: ''
                });

                if (result.success) {
                    alert('✅ 新增成功！');
                    await reloadData();
                } else {
                    alert('❌ 新增失败: ' + (result.error || '未知错误'));
                }
            }

            window.deleteDay = async function(day) {
                if (!confirm('确定要删除 Day ' + day + ' 吗？此操作不可恢复！')) return;
                const password = getPassword();
                if (!password) { alert('请输入管理员密码'); return; }

                const result = await apiCall('DELETE', '/api/itinerary/' + day, { password: password });
                if (result.success) {
                    alert('✅ 删除成功！');
                    await reloadData();
                } else {
                    alert('❌ 删除失败: ' + (result.error || '未知错误'));
                }
            };

            window.editPlaceField = function(placeId, field) {
                if (!isAdminMode) return;
                const place = allDaysData.flatMap(d => d.places || []).find(p => p.id === placeId);
                if (!place) return;

                const currentValue = place[field] || '';
                const newValue = prompt('修改 ' + field + ':', currentValue);
                if (newValue === null) return;

                place[field] = newValue.trim();
                editedData['place_' + placeId] = {
                    ...editedData['place_' + placeId],
                    [field]: newValue.trim()
                };

                renderDays();
                renderOverview();
            };

            window.editTransport = function(placeId) {
                if (!isAdminMode) return;
                const place = allDaysData.flatMap(d => d.places || []).find(p => p.id === placeId);
                if (!place) return;

                const newName = prompt('交通方式名称:', place.name);
                if (newName === null) return;
                const newIntro = prompt('交通详情:', place.intro || '');
                if (newIntro === null) return;

                place.name = newName.trim();
                place.intro = newIntro.trim();
                editedData['place_' + placeId] = {
                    ...editedData['place_' + placeId],
                    name: newName.trim(),
                    intro: newIntro.trim()
                };

                renderDays();
                renderOverview();
            };

            window.addTransportBefore = function(day, index) {
                if (!isAdminMode) return;
                const dayData = allDaysData.find(d => d.day === day);
                if (!dayData) return;

                const name = prompt('交通方式名称 (如 公交307路):');
                if (!name) return;
                const intro = prompt('交通详情:');
                if (intro === null) return;

                const newPlace = {
                    id: -Date.now(),
                    name: name.trim(),
                    type: 'transport',
                    day: day,
                    time_start: '',
                    time_end: '',
                    duration: '',
                    intro: intro.trim(),
                    address: '',
                    nav_link: '',
                    image_url: '',
                    platform_links: '',
                    remark: '',
                    map_x: 50,
                    map_y: 50,
                    sort_order: index + 0.5,
                    peak_alternative: '',
                    congestion_alternative: '',
                    rainy_alternative: ''
                };

                dayData.places.splice(index + 1, 0, newPlace);
                const order = dayData.place_order || [];
                order.splice(index + 1, 0, newPlace.id);

                editedData['day_' + day] = {
                    ...editedData['day_' + day],
                    place_order: order
                };

                renderDays();
                renderOverview();
                alert('✅ 交通已添加，记得按「保存修改」提交。');
            };

            window.deletePlace = function(day, placeId) {
                if (!confirm('确定删除此景点/交通吗？')) return;
                const dayData = allDaysData.find(d => d.day === day);
                if (!dayData) return;

                const idx = dayData.places.findIndex(p => p.id === placeId);
                if (idx === -1) return;
                dayData.places.splice(idx, 1);
                const order = dayData.place_order || [];
                const oIdx = order.indexOf(placeId);
                if (oIdx !== -1) order.splice(oIdx, 1);

                editedData['day_' + day] = {
                    ...editedData['day_' + day],
                    place_order: order
                };

                renderDays();
                renderOverview();
                alert('✅ 已删除，记得按「保存修改」提交。');
            };

            window.editDayMeta = function(day) {
                if (!isAdminMode) return;
                const dayData = allDaysData.find(d => d.day === day);
                if (!dayData) return;

                const newTitle = prompt('标题:', dayData.title || '');
                if (newTitle === null) return;
                const newSubtitle = prompt('副标题:', dayData.subtitle || '');
                if (newSubtitle === null) return;

                dayData.title = newTitle.trim();
                dayData.subtitle = newSubtitle.trim();
                editedData['day_' + day] = {
                    ...editedData['day_' + day],
                    title: newTitle.trim(),
                    subtitle: newSubtitle.trim()
                };

                renderDays();
                renderOverview();
            };

            window.addPlaceToDay = async function(day) {
                if (!isAdminMode) return;
                const password = getPassword();
                if (!password) { alert('请输入管理员密码'); return; }

                const name = prompt('景点名称:');
                if (!name) return;
                const type = prompt('类型 (attraction/food/transport/culture/rest/shopping/other):', 'attraction');
                if (!type) return;
                const timeStart = prompt('开始时间 (如 09:00):', '');
                const timeEnd = prompt('结束时间 (如 10:30):', '');

                const result = await apiCall('POST', '/api/places', {
                    password: password,
                    name: name.trim(),
                    type: type.trim(),
                    day: day,
                    time_start: timeStart || '',
                    time_end: timeEnd || '',
                    duration: '',
                    intro: '',
                    address: '',
                    nav_link: '',
                    image_url: '',
                    platform_links: '',
                    remark: '',
                    map_x: 50,
                    map_y: 50,
                    sort_order: 0,
                    peak_alternative: '',
                    congestion_alternative: '',
                    rainy_alternative: ''
                });

                if (result.success) {
                    const dayData = allDaysData.find(d => d.day === day);
                    const order = dayData.place_order || [];
                    order.push(result.id);
                    await apiCall('PUT', '/api/itinerary/' + day, {
                        password: password,
                        place_order: order
                    });
                    alert('✅ 景点添加成功！');
                    await reloadData();
                } else {
                    alert('❌ 添加失败: ' + (result.error || '未知错误'));
                }
            };

            async function reloadData() {
                const data = await loadItineraryData();
                if (data) {
                    allDaysData = data;
                    renderDays();
                    renderOverview();
                    if (currentTab) {
                        const exists = data.some(d => d.day === currentTab);
                        if (!exists && data.length > 0) {
                            currentTab = data[0].day;
                        }
                        renderMap(currentTab);
                    }
                }
            }

            // ============================================================
            // 10. 辅助功能
            // ============================================================

            function setupScrollAnimation() {
                const cards = document.querySelectorAll('.place-card');
                if (cards.length === 0) return;
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, { threshold: 0.15 });
                cards.forEach(card => observer.observe(card));
            }

            function updateReadingProgress() {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
                const bar = document.getElementById('reading-progress-bar');
                if (bar) bar.style.width = Math.min(progress, 100) + '%';
            }

            function setupBackToTop() {
                const btn = document.getElementById('back-to-top');
                if (!btn) return;
                const toggle = () => btn.classList.toggle('show', window.scrollY > 500);
                btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
                window.addEventListener('scroll', toggle, { passive: true });
                toggle();
            }

            window.toggleOverview = function(header) {
                const group = header.closest('.overview-group');
                if (group) group.classList.toggle('open');
            };

            // ============================================================
            // 11. 启动
            // ============================================================

            document.addEventListener('DOMContentLoaded', async function() {
                console.log('📄 DOM 已加载，开始初始化...');

                // 加载数据
                const data = await loadItineraryData();
                if (data && data.length > 0) {
                    allDaysData = data;
                    if (data.length > 0) currentTab = data[0].day;
                    renderDays();
                    renderOverview();
                    setupStickyDays();
                    setupExpandCollapse();
                    setupAdminMode();
                    setupBackToTop();
                    window.addEventListener('scroll', updateReadingProgress, { passive: true });
                    updateReadingProgress();

                    document.querySelectorAll('.day-group .day-body').forEach(body => {
                        body.style.maxHeight = '0';
                        body.style.opacity = '0';
                        body.style.padding = '0 20px';
                    });
                } else {
                    document.getElementById('day-groups-container').innerHTML =
                        '<p style="padding:40px;text-align:center;color:#8a8a8a;">⚠️ 暂无行程数据</p>';
                    renderOverview();
                    setupAdminMode();
                    setupBackToTop();
                }
            });

            console.log('🚀 应用脚本已加载，等待 DOM 就绪...');

        })(); // IIFE 结束
    </script>
</body>
</html>
